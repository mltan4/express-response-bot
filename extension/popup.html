<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ReplyKit</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 300px; color: #111827; }
  .header { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 10px; }
  .badge { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg,#6366f1,#a855f7); display:inline-flex; align-items:center; justify-content:center; color:#fff; }
  .body { padding: 14px 16px; font-size: 13px; line-height: 1.5; }
  .row { margin-bottom: 10px; }
  .muted { color: #6b7280; font-size: 12px; }
  button.primary {
    width: 100%; padding: 10px; border-radius: 10px; border: none;
    background: linear-gradient(135deg,#6366f1,#a855f7); color:#fff; font-weight:600; cursor:pointer; font-size: 13px;
  }
  button.ghost {
    width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;
    background:#fff; color:#374151; cursor:pointer; font-size: 12px; margin-top: 6px;
  }
  .signed-in { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 12px; color: #166534; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
</style>
</head>
<body>
  <div class="header">
    <span class="badge">✨</span>
    <div>
      <div style="font-weight:600">ReplyKit</div>
      <div class="muted" style="font-size:11px">for LinkedIn</div>
    </div>
  </div>
  <div class="body">
    <div id="auth-area"></div>
    <div class="row muted" style="margin-top:12px">
      Open a LinkedIn DM or any post and click the ✨ ReplyKit button next to the text box.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
